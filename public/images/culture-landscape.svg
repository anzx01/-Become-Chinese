<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Layered spring landscape illustration</title>
  <desc id="desc">An original vector illustration of misty hills, blossom branches, terraces, and warm morning light.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdf2f8"/>
      <stop offset="0.5" stop-color="#eef2ff"/>
      <stop offset="1" stop-color="#fff7ed"/>
    </linearGradient>
    <linearGradient id="hillA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7f1d1d"/>
      <stop offset="1" stop-color="#be185d"/>
